<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jio design system - complete button showcase</title>

    <!-- CRITICAL: Load JioType font BEFORE React script -->
    <!-- Font must load before React mounts for correct typography -->
    <link rel="stylesheet" href="/fonts/fonts.css" />

    <!-- Preload font for faster loading -->
    <link
      rel="preload"
      href="/fonts/@JioTypeVar.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "JioType Var", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- React script loads AFTER fonts.css -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
